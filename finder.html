<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG1 Labs — Local Business Finder</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --accent: #e94560;
    --accent-hover: #ff6b81;
    --border: #0f3460;
    --text: #eaeaea;
    --text-muted: #8892b0;
    --input-bg: #0f1a2f;
    --success: #2ecc71;
    --radius: 8px;
  }
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }
  header {
    text-align: center;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  header h1 span {
    color: var(--accent);
  }
  header p {
    color: var(--text-muted);
    margin-top: 4px;
    font-size: 0.95rem;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
    margin-bottom: 24px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 180px;
  }
  .field label {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-muted);
  }
  .field input, .field select {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: var(--radius);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .town-state-row {
    display: flex;
    gap: 8px;
  }
  .town-state-row input {
    flex: 1;
  }
  .town-state-row select {
    width: auto;
    min-width: 70px;
    flex: 0 0 auto;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field input::placeholder {
    color: var(--text-muted);
    opacity: 0.7;
  }

  /* Radius slider */
  .radius-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .radius-group input[type=range] {
    flex: 1;
    min-width: 80px;
    accent-color: var(--accent);
  }
  .radius-value {
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 600;
    min-width: 52px;
    text-align: right;
  }

  /* Search button */
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 10px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
    height: 43px;
  }
  .btn:hover {
    background: var(--accent-hover);
  }
  .btn:active {
    transform: scale(0.97);
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Status area */
  .status {
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    color: var(--text-muted);
    font-size: 0.9rem;
  }
  .error-msg {
    background: rgba(233, 69, 96, 0.12);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 16px;
    border-radius: var(--radius);
    font-size: 0.9rem;
    text-align: center;
  }
  .empty-msg {
    color: var(--text-muted);
    text-align: center;
    font-size: 0.95rem;
    padding: 32px 0;
  }

  /* Results table (desktop) */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    display: none;
  }
  .results-table thead th {
    text-align: left;
    padding: 10px 12px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    border-bottom: 2px solid var(--border);
  }
  .results-table tbody td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    font-size: 0.9rem;
  }
  .results-table tbody tr:hover {
    background: rgba(15, 52, 96, 0.3);
  }
  .results-table .name-cell {
    font-weight: 600;
    color: var(--text);
  }
  .results-table .address-cell {
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .results-table .link-cell a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.85rem;
  }
  .results-table .link-cell a:hover {
    text-decoration: underline;
  }
  .btn-preview {
    display: inline-block;
    background: var(--border);
    color: var(--text);
    border: 1px solid var(--accent);
    padding: 6px 14px;
    border-radius: var(--radius);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .btn-preview:hover {
    background: var(--accent);
    color: #fff;
  }

  /* Result cards (mobile) */
  .results-cards {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: border-color 0.2s;
  }
  .result-card:hover {
    border-color: var(--accent);
  }
  .result-card .rc-name {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 4px;
  }
  .result-card .rc-address {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 6px;
  }
  .result-card .rc-links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
  }
  .result-card .rc-links a {
    color: var(--accent);
    font-size: 0.85rem;
    text-decoration: none;
  }
  .result-card .rc-links a:hover {
    text-decoration: underline;
  }
  .result-card .rc-actions {
    text-align: right;
  }

  /* Summary */
  .results-summary {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: none;
  }

  /* Footer */
  .attribution {
    text-align: center;
    padding: 24px 0;
    color: var(--text-muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
  .attribution a {
    color: var(--accent);
    text-decoration: none;
  }
  .attribution a:hover {
    text-decoration: underline;
  }

  /* Responsive breakpoints */
  @media (min-width: 640px) {
    .results-table { display: table; }
    .results-cards { display: none; }
    .results-summary { display: block; }
  }
  @media (max-width: 639px) {
    .results-cards { display: flex; }
    .results-table { display: none; }
    .results-summary { display: block; }
    .controls { flex-direction: column; }
    .field { min-width: 100%; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>SG1 Labs <span>Lead Finder</span></h1>
    <p>Discover local food businesses using OpenStreetMap</p>
  </header>

  <div class="controls">
    <div class="field">
      <label for="town">Town / City</label>
      <div class="town-state-row">
        <input type="text" id="town" placeholder="e.g. Gettysburg" autofocus>
        <select id="state"><option value="AL">AL</option><option value="AK">AK</option><option value="AZ">AZ</option><option value="AR">AR</option><option value="CA">CA</option><option value="CO">CO</option><option value="CT">CT</option><option value="DE">DE</option><option value="FL">FL</option><option value="GA">GA</option><option value="HI">HI</option><option value="ID">ID</option><option value="IL">IL</option><option value="IN">IN</option><option value="IA">IA</option><option value="KS">KS</option><option value="KY">KY</option><option value="LA">LA</option><option value="ME">ME</option><option value="MD">MD</option><option value="MA">MA</option><option value="MI">MI</option><option value="MN">MN</option><option value="MS">MS</option><option value="MO">MO</option><option value="MT">MT</option><option value="NE">NE</option><option value="NV">NV</option><option value="NH">NH</option><option value="NJ">NJ</option><option value="NM">NM</option><option value="NY">NY</option><option value="NC">NC</option><option value="ND">ND</option><option value="OH">OH</option><option value="OK">OK</option><option value="OR">OR</option><option value="PA" selected>PA</option><option value="RI">RI</option><option value="SC">SC</option><option value="SD">SD</option><option value="TN">TN</option><option value="TX">TX</option><option value="UT">UT</option><option value="VT">VT</option><option value="VA">VA</option><option value="WA">WA</option><option value="WV">WV</option><option value="WI">WI</option><option value="WY">WY</option><option value="DC">DC</option></select>
      </div>
    </div>
    <div class="field">
      <label for="category">Category</label>
      <select id="category">
        <option value="">-- Choose --</option>
        <option value="restaurant">Restaurants</option>
        <option value="cafe">Cafes &amp; Coffee</option>
        <option value="bakery">Bakeries</option>
        <option value="farm">Farms &amp; Produce</option>
        <option value="distillery">Distilleries &amp; Breweries</option>
        <option value="food_truck">Food Trucks</option>
        <option value="butcher">Butchers &amp; Meat</option>
        <option value="market">Markets</option>
      </select>
    </div>
    <div class="field">
      <label for="radius">Radius</label>
      <div class="radius-group">
        <input type="range" id="radius" min="1" max="20" value="5" step="1">
        <span class="radius-value" id="radiusVal">5 km</span>
      </div>
    </div>
    <button class="btn" id="searchBtn">Search</button>
  </div>

  <div class="status" id="status">
    <p class="empty-msg" id="emptyMsg">Enter a town and pick a category to find businesses</p>
  </div>

  <div class="results-summary" id="summary"></div>

  <div class="results-cards" id="cards"></div>
  <table class="results-table" id="table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Contact</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="attribution">
    Powered by <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> &mdash; data &copy; OSM contributors
  </div>
</div>

<script>
(function() {
  'use strict';

  // ── DOM refs ────────────────────────────────────────────────
  const townInput    = document.getElementById('town');
  const catSelect    = document.getElementById('category');
  const radiusSlider = document.getElementById('radius');
  const radiusVal    = document.getElementById('radiusVal');
  const searchBtn    = document.getElementById('searchBtn');
  const statusDiv    = document.getElementById('status');
  const emptyMsg     = document.getElementById('emptyMsg');
  const summaryDiv   = document.getElementById('summary');
  const cardsDiv     = document.getElementById('cards');
  const tbody        = document.getElementById('tbody');

  // ── OSM tag mappings ────────────────────────────────────────
  const stateSelect   = document.getElementById('state');
  var CATEGORIES = {
    restaurant:  'restaurant',
    cafe:        'cafe',
    bakery:      'bakery',
    farm:        'farm+stand',
    distillery:  'distillery',
    food_truck:  'food+truck',
    butcher:     'butcher',
    market:      'farmers+market'
  };

  // ── UI helpers ──────────────────────────────────────────────
  radiusSlider.addEventListener('input', function() {
    radiusVal.textContent = this.value + ' km';
  });

  // Allow Enter key to trigger search
  townInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchBtn.click();
  });
  catSelect.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchBtn.click();
  });

  function clearResults() {
    tbody.innerHTML = '';
    cardsDiv.innerHTML = '';
    summaryDiv.textContent = '';
    summaryDiv.style.display = 'none';
    emptyMsg.style.display = 'none';
  }

  function showStatus(html, isError) {
    clearResults();
    statusDiv.innerHTML = html;
    if (isError) {
      // keep error visible
    }
  }

  function showLoading() {
    statusDiv.innerHTML = '<span class="spinner"></span><span class="loading-text">Searching...</span>';
    emptyMsg.style.display = 'none';
  }

  function showError(msg) {
    statusDiv.innerHTML = '<div class="error-msg">' + escapeHtml(msg) + '</div>';
  }

  function showEmpty(msg) {
    emptyMsg.style.display = 'block';
    emptyMsg.textContent = msg || 'Enter a town and pick a category to find businesses';
    statusDiv.innerHTML = '';
    statusDiv.appendChild(emptyMsg);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Build display address from Nominatim result ────────────
  function buildAddress(item) {
    var addr = item.address || {};
    var parts = [];
    if (addr.road && addr.house_number) parts.push(addr.house_number + ' ' + addr.road);
    else if (addr.road) parts.push(addr.road);
    if (addr.town || addr.city || addr.village) parts.push(addr.town || addr.city || addr.village);
    if (addr.state) parts.push(addr.state);
    return parts.join(', ') || item.display_name || '';
  }

  // ── Build preview URL ───────────────────────────────────────
  function previewUrl(type, item) {
    var name = item.name || 'Unnamed';
    var addr = buildAddress(item) || '';
    var params = new URLSearchParams();
    params.set('type', type);
    params.set('name', name);
    if (addr) params.set('address', addr);
    return './generator.html?' + params.toString();
  }

  // ── Render results ──────────────────────────────────────────
  function renderResults(items, type) {
    statusDiv.innerHTML = '';

    if (!items || items.length === 0) {
      summaryDiv.textContent = 'No results found.';
      summaryDiv.style.display = 'block';
      showEmpty('No businesses found. Try a different town or category.');
      return;
    }

    summaryDiv.textContent = 'Found ' + items.length + ' result' + (items.length !== 1 ? 's' : '');
    summaryDiv.style.display = 'block';

    // Sort by name
    items.sort(function(a, b) {
      var na = (a.name || '').toLowerCase();
      var nb = (b.name || '').toLowerCase();
      return na < nb ? -1 : na > nb ? 1 : 0;
    });

    // Build table rows
    tbody.innerHTML = '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var name = escapeHtml(item.name || 'Unnamed');
      var addr = escapeHtml(buildAddress(item) || '—');
      var pUrl = previewUrl(type, item);

      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="name-cell">' + name + '</td>' +
        '<td class="address-cell">' + addr + '</td>' +
        '<td>' + (item.class || item.type || '') + '</td>' +
        '<td><a class="btn-preview" href="' + pUrl + '">Generate Preview &rarr;</a></td>';
      tbody.appendChild(tr);
    }

    // Build cards
    cardsDiv.innerHTML = '';
    for (var j = 0; j < items.length; j++) {
      var citem = items[j];
      var cname = escapeHtml(citem.name || 'Unnamed');
      var caddr = escapeHtml(buildAddress(citem) || '—');
      var cpUrl = previewUrl(type, citem);

      var card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML =
        '<div class="rc-name">' + cname + '</div>' +
        '<div class="rc-address">' + caddr + '</div>' +
        '<div class="rc-actions"><a class="btn-preview" href="' + cpUrl + '">Generate Preview &rarr;</a></div>';
      cardsDiv.appendChild(card);
    }
  }

  // ── Query Nominatim API ─────────────────────────────────────
  async function queryNominatim(category, town) {
    var q = encodeURIComponent(category + ' in ' + town);
    var url = 'https://nominatim.openstreetmap.org/search?q=' + q + '&format=json&limit=20&addressdetails=1';
    var resp = await fetch(url, {
      headers: { 'Accept': 'application/json' }
    });
    if (!resp.ok) throw new Error('Nominatim API error (HTTP ' + resp.status + ')');
    var data = await resp.json();
    return data || [];
  }

  // ── Main search handler (Nominatim — no geocode needed) ────
  searchBtn.addEventListener('click', async function() {
    var town = townInput.value.trim();
    var state = stateSelect.value;
    var category = catSelect.value;
    var location = town + ', ' + state;

    if (!town) {
      showError('Please enter a town or city name.');
      return;
    }
    if (!category) {
      showError('Please select a category.');
      return;
    }

    searchBtn.disabled = true;
    showLoading();

    try {
      var searchTerm = CATEGORIES[category] || category;
      var results = await queryNominatim(searchTerm, location);

      // Distillery category: also search for breweries (Nominatim misses craft=distillery)
      if (category === 'distillery') {
        try {
          var brewResults = await queryNominatim('brewery', location);
          results = results.concat(brewResults);
        } catch (e) {
          console.warn('Brewery sub-query failed:', e);
        }
      }

      // Deduplicate by place_id
      var seen = {};
      results = results.filter(function(el) {
        if (seen[el.place_id]) return false;
        seen[el.place_id] = true;
        return true;
      });
      renderResults(results, category);

    } catch (err) {
      console.error(err);
      showError(err.message || 'Something went wrong. The OpenStreetMap servers may be busy — try again in a moment.');
    } finally {
      searchBtn.disabled = false;
    }
  });

})();
</script>
</body>
</html>
