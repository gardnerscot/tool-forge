<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG1 Labs Preview Generator</title>
<style>
/* ===== Generator UI (Dark Theme) ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e; color: #e0e0e0; overflow: hidden; height: 100vh;
}
#app { display: flex; height: 100vh; }
#left { width: 420px; min-width: 360px; overflow-y: auto; padding: 1.5rem; background: #16213e; border-right: 1px solid #0f3460; }
#right { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; }
#right-header { padding: 0.75rem 1.5rem; background: #16213e; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #0f3460; }
#right-header h2 { font-size: 0.95rem; font-weight: 600; color: #e0e0e0; }
#right-header .actions { display: flex; gap: 0.5rem; }
#preview-frame { flex: 1; width: 100%; border: none; }
h1 { font-size: 1.3rem; font-weight: 700; color: #e94560; margin-bottom: 0.25rem; }
.subtitle { font-size: 0.8rem; color: #888; margin-bottom: 1.25rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: #aaa; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.04em; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.55rem 0.65rem; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; font-size: 0.85rem; font-family: inherit; transition: border-color 0.2s; }
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #e94560; }
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 0.75rem; }
.form-row .form-group { flex: 1; }
.section-label { font-size: 0.75rem; font-weight: 700; color: #e94560; text-transform: uppercase; letter-spacing: 0.08em; margin: 1.25rem 0 0.75rem; padding-top: 0.75rem; border-top: 1px solid #0f3460; }
.dynamic-item { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; }
.dynamic-item .form-row { margin-bottom: 0.4rem; }
.dynamic-item .form-row:last-child { margin-bottom: 0; }
.btn-remove { background: #e94560; color: #fff; border: none; padding: 0.2rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
.btn-add { background: transparent; color: #e94560; border: 1px dashed #e94560; padding: 0.4rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.78rem; width: 100%; margin-top: 0.25rem; }
.btn { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
.btn-primary { background: #e94560; color: #fff; }
.btn-primary:hover { background: #d63850; }
.btn-outline { background: transparent; border: 1px solid #0f3460; color: #ccc; }
.btn-outline:hover { background: #1a1a2e; border-color: #e94560; }
#copy-toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: #e94560; color: #fff; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; font-size: 0.85rem; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
#copy-toast.show { opacity: 1; }
@media (max-width: 800px) {
  #app { flex-direction: column; }
  #left { width: 100%; min-width: unset; max-height: 50vh; }
  #preview-frame { min-height: 400px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="left">
    <h1>SG1 Labs Preview</h1>
    <p class="subtitle">Build &amp; preview demo pages in realtime</p>

    <div class="form-group">
      <label>Template Type</label>
      <select id="type-select">
        <option value="restaurant">Restaurant</option>
        <option value="farmvendor">Farm Vendor</option>
        <option value="farmstore">Farm Store</option>
        <option value="subscription">Subscription Boxes</option>
        <option value="foodtruck">Food Truck</option>
        <option value="distillery">Distillery</option>
        <option value="bakery">Bakery</option>
        <option value="coffee">Coffee Shop</option>
      </select>
    </div>

    <div class="section-label">Business Info</div>
    <div class="form-group"><label>Business Name</label><input id="f-name" placeholder="e.g. Oak &amp; Ember" oninput="scheduleUpdate()"></div>
    <div class="form-group"><label>Tagline</label><input id="f-tagline" placeholder="e.g. Farm-to-table, done right" oninput="scheduleUpdate()"></div>
    <div class="form-group"><label>Description / Owner Story</label><textarea id="f-desc" placeholder="Tell your story..." oninput="scheduleUpdate()"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Address</label><input id="f-address" placeholder="123 Main St, City" oninput="scheduleUpdate()"></div>
      <div class="form-group"><label>Phone</label><input id="f-phone" placeholder="(555) 123-4567" oninput="scheduleUpdate()"></div>
    </div>

    <!-- Type-specific fields injected here -->
    <div id="dynamic-fields"></div>
  </div>

  <div id="right">
    <div id="right-header">
      <h2>Live Preview</h2>
      <div class="actions">
        <button class="btn btn-outline" onclick="copyHTML()">Copy HTML</button>
      </div>
    </div>
    <iframe id="preview-frame" sandbox="allow-scripts" title="Live Preview"></iframe>
  </div>
</div>
<div id="copy-toast">HTML copied to clipboard!</div>

// ===== TYPE-SPECIFIC FORM RENDERING =====
const typeLabels = {
  restaurant: 'Restaurant',
  farmvendor: 'Farm Vendor',
  farmstore: 'Farm Store',
  subscription: 'Subscription Boxes',
  foodtruck: 'Food Truck',

function renderDynamicFields() {
  const t = data.type;
  const el = document.getElementById('dynamic-fields');
  let html = '';

  // ---- RESTAURANT ----
  if (t === 'restaurant') {
    html += '<div class="section-label">Restaurant Details</div>';
    html += '<div class="form-row"><div class="form-group"><label>Rating</label><input id="f-rating" value="'+esc(data.rating)+'" oninput="d(\'rating\')"></div><div class="form-group"><label>Review Count</label><input id="f-reviews" value="'+esc(data.reviews)+'" oninput="d(\'reviews\')"></div></div>';
    html += '<div class="form-group"><label>Hours</label><input id="f-hours" value="'+esc(data.hours)+'" oninput="d(\'hours\')"></div>';
    html += '<div class="section-label">Menu Items (up to 8)</div>';
    html += '<div id="menu-items-container">';
    data.menuItems.forEach((mi, i) => {
      html += '<div class="dynamic-item"><div class="form-row"><div class="form-group"><label>Name</label><input value="'+esc(mi.name)+'" oninput="dArr(\'menuItems\','+i+',\'name\',this.value)"></div><div class="form-group"><label>Price</label><input value="'+esc(mi.price)+'" oninput="dArr(\'menuItems\','+i+',\'price\',this.value)" style="width:80px"></div></div><div class="form-group" style="margin-bottom:0"><label>Description</label><input value="'+esc(mi.desc)+'" oninput="dArr(\'menuItems\','+i+',\'desc\',this.value)"></div></div>';

    data.farmProducts.forEach((p, i) => {

    html += '<div class="section-label">Farm Store Details</div>';
    html += '<div class="form-group"><label>Hours</label><input id="f-hours" value="'+esc(data.hours||'')+'" oninput="d(\'hours\')"></div>';

    });
    html += '</div><button class="btn-add" onclick="addItem(\'truckMenu\',{name:\'\',price:\'\'},6)">+ Add Menu Item</button>';

    data.spirits.forEach((s, i) => {
      html += '<div class="dynamic-item"><div class="form-row"><div class="form-group"><label>Name</label><input value="'+esc(s.name)+'" oninput="dArr(\'spirits\','+i+',\'name\',this.value)"></div><div class="form-group"><label>Price</label><input value="'+esc(s.price)+'" oninput="dArr(\'spirits\','+i+',\'price\',this.value)" style="width:80px"></div></div><div class="form-group" style="margin-bottom:0"><label>Description</label><input value="'+esc(s.desc)+'" oninput="dArr(\'spirits\','+i+',\'desc\',this.value)"></div></div>';
    });

  // ---- BAKERY ----
  else if (t === 'bakery') {

    html += '<div class="form-group"><label>Hours</label><input id="f-hours" value="'+esc(data.hours||'')+'" oninput="d(\'hours\')"></div>';

  // ---- COFFEE SHOP ----
  else if (t === 'coffee') {
    html += '<div class="section-label">Coffee Shop Details</div>';
    html += '<div class="form-group"><label>Hours</label><input id="f-hours" value="'+esc(data.hours||'')+'" oninput="d(\'hours\')"></div>';

    data.drinks.forEach((d, i) => {

    });

    html += '<div class="form-group"><label>Food Items</label><input id="f-foodItems" value="'+esc(data.foodItems)+'" oninput="d(\'foodItems\')"></div>';
    html += '<div class="form-group"><label>Events / Specials</label><textarea id="f-coffeeEventInfo" oninput="d(\'coffeeEventInfo\')">'+esc(data.coffeeEventInfo)+'</textarea></div>';

}

// ===== DATA BINDING HELPERS =====
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function d(key) {
  const el = document.getElementById('f-'+key) || document.getElementById('f-'+key.replace(/[A-Z]/g, m=>'-'+m.toLowerCase()));
  if (el) data[key] = el.value;
  scheduleUpdate();
}

function dArr(arrKey, idx, prop, val) {
  data[arrKey][idx][prop] = val;
  scheduleUpdate();
}

function addItem(arrKey, template, max) {
  if (data[arrKey].length >= max) { alert('Max '+max+' items'); return; }
  data[arrKey].push({...template});
  renderDynamicFields();
  scheduleUpdate();
}

// ===== DEBOUNCED UPDATE =====
let updateTimer;
function scheduleUpdate() {
  clearTimeout(updateTimer);
  updateTimer = setTimeout(updatePreview, 500);
}

// Re-read all form values into data (for fields that bypass d())
function syncFormData() {
  // common
  data.name = document.getElementById('f-name')?.value || data.name;
  data.tagline = document.getElementById('f-tagline')?.value || data.tagline;
  data.desc = document.getElementById('f-desc')?.value || data.desc;
  data.address = document.getElementById('f-address')?.value || data.address;
  data.phone = document.getElementById('f-phone')?.value || data.phone;
  const t = data.type;
  // type-specific simple fields
  const fMap = {
    restaurant: ['rating','reviews','hours'],
    farmvendor: ['marketSchedule','preorderItems'],
    farmstore: ['hours','bulkOrder'],
    subscription: ['deliveryInfo','minOrder'],
    foodtruck: ['smsNumber','weeklySchedule','cateringInfo'],
    distillery: ['tastingHours','tourInfo'],
    bakery: ['hours'],
    coffee: ['hours','foodItems','coffeeEventInfo']
  };
  const keys = fMap[t] || [];
  keys.forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) data[k] = el.value;
  });
}

function updatePreview() {
  syncFormData();
  const t = data.type;
  let html;
  switch(t) {
    case 'restaurant': html = renderRestaurant(data); break;
    case 'farmvendor': html = renderFarmVendor(data); break;
    case 'farmstore': html = renderFarmStore(data); break;
    case 'subscription': html = renderSubscription(data); break;
    case 'foodtruck': html = renderFoodTruck(data); break;

    default: html = '<p>Unknown type</p>';
  }

function copyHTML() {
  syncFormData();
  const t = data.type;
  let html;
  switch(t) {
    case 'restaurant': html = renderRestaurant(data); break;
    case 'farmvendor': html = renderFarmVendor(data); break;
    case 'farmstore': html = renderFarmStore(data); break;
    case 'subscription': html = renderSubscription(data); break;
    case 'foodtruck': html = renderFoodTruck(data); break;
    case 'distillery': html = renderDistillery(data); break;
    case 'bakery': html = renderBakery(data); break;
    case 'coffee': html = renderCoffee(data); break;
  }
  navigator.clipboard.writeText(html).then(() => {
    const toast = document.getElementById('copy-toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
}
